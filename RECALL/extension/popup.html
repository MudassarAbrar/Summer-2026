<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recall — Save and Act</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        width: 340px;
        margin: 0;
        padding: 16px;
        background-color: #f8fafc;
        color: #1e293b;
        box-sizing: border-box;
      }
      
      * {
        box-sizing: border-box;
      }
      
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 12px;
      }
      
      .logo {
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      
      .logo h1 {
        font-size: 20px;
        font-weight: 800;
        color: #2563eb;
        margin: 0;
        letter-spacing: -0.5px;
      }
      
      .tag {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        color: #64748b;
        letter-spacing: 0.5px;
      }
      
      .view-container {
        display: none;
      }
      
      .active-view {
        display: block;
      }
      
      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 0;
        gap: 12px;
      }
      
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      .form-group {
        margin-bottom: 12px;
      }
      
      .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #64748b;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 13px;
        background-color: #ffffff;
        color: #1e293b;
        font-family: inherit;
        transition: all 0.2s;
      }
      
      .form-group input:focus, .form-group textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      
      .primary-btn {
        width: 100%;
        padding: 11px;
        background-color: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      
      .primary-btn:hover {
        background-color: #1d4ed8;
      }
      
      .primary-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      
      .error-msg {
        color: #ef4444;
        background-color: #fee2e2;
        border: 1px solid #fecaca;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 12px;
        display: none;
        word-break: break-word;
      }
      
      .tab-info-box {
        background-color: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
      }
      
      .tab-title {
        font-weight: 600;
        font-size: 13px;
        color: #334155;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .tab-url {
        font-size: 11px;
        color: #64748b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .success-box {
        text-align: center;
        padding: 24px 12px;
      }
      
      .success-icon {
        font-size: 36px;
        color: #10b981;
        margin-bottom: 8px;
      }
      
      .success-box h3 {
        margin: 0 0 6px 0;
        font-size: 16px;
        color: #0f172a;
      }
      
      .success-box p {
        margin: 0;
        font-size: 13px;
        color: #64748b;
      }
      
      .footer-links {
        display: flex;
        justify-content: space-between;
        margin-top: 14px;
        padding-top: 8px;
        border-top: 1px solid #f1f5f9;
      }
      
      .footer-link {
        font-size: 11px;
        color: #94a3b8;
        text-decoration: none;
        cursor: pointer;
        font-weight: 500;
      }
      
      .footer-link:hover {
        color: #64748b;
      }
      
      .btn-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #ffffff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <h1>Recall</h1>
        <span class="tag">Extension</span>
      </div>
    </div>

    <!-- VIEW 1: LOADING SESSION -->
    <div id="loading-view" class="view-container active-view">
      <div class="loading-state">
        <div class="spinner"></div>
        <div style="font-size: 13px; color: #64748b; font-weight: 500;">Checking connection...</div>
      </div>
    </div>

    <!-- VIEW 2: AUTHENTICATION -->
    <div id="auth-view" class="view-container">
      <div class="error-msg" id="auth-error"></div>
      <form id="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="auth-email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required />
        </div>
        <button type="submit" id="auth-btn" class="primary-btn">
          <span class="btn-spinner" id="auth-spinner"></span>
          <span id="auth-btn-text">Log In</span>
        </button>
      </form>
      <div style="font-size: 12px; color: #64748b; text-align: center; margin-top: 16px;">
        Please log into your Recall account to save links.
      </div>
    </div>

    <!-- VIEW 3: SAVE LINK -->
    <div id="save-view" class="view-container">
      <div class="error-msg" id="save-error"></div>
      <div class="tab-info-box">
        <div class="tab-title" id="page-title">Loading...</div>
        <div class="tab-url" id="page-url">Loading...</div>
      </div>
      
      <div class="form-group">
        <label>Optional Note</label>
        <textarea id="page-note" rows="3" placeholder="e.g. read this before starting the project, try this tools list..."></textarea>
      </div>

      <button id="save-btn" class="primary-btn">
        <span class="btn-spinner" id="save-spinner"></span>
        <span id="save-btn-text">Save to Recall</span>
      </button>

      <div class="footer-links">
        <span id="user-display" class="footer-link" style="cursor: default; color: #64748b;">user@example.com</span>
        <a id="logout-btn" class="footer-link">Log Out</a>
      </div>
    </div>

    <!-- VIEW 4: SUCCESS -->
    <div id="success-view" class="view-container">
      <div class="success-box">
        <div class="success-icon">✓</div>
        <h3>Saved to Recall</h3>
        <p>AI is now summarizing & categorizing the content...</p>
      </div>
    </div>

    <!-- Supabase SDK -->
    <script src="supabase.js"></script>
    <!-- Extension logic -->
    <script src="popup.js"></script>
  </body>
</html>
